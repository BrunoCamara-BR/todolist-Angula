<div class="add-button">
  <app-button text="add" (clickedButton)="dialogAdd()"></app-button>
</div>

<app-todo-container
  [tasks]="tasks"
  (removeTask)="removeTask($event)"
  (editTask)="dialogEdit($event)"
></app-todo-container>

@if (isDialogOpen) {
  <app-dialog
    [newTask]="blankTask"
    [dialogMode]="dialogMode"
    (closeButton)="isDialogOpen = false"
    (saveTask)="addTask($event)"
  ></app-dialog>
}
